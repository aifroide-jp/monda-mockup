  <rect width="48" height="48" rx="10.5" fill="url(#ig-grad)"/>
  <rect x="12.5" y="12.5" width="23" height="23" rx="6.5" fill="none" stroke="#fff" stroke-width="3"/>
  <circle cx="24" cy="24" r="5.5" fill="none" stroke="#fff" stroke-width="3"/>
